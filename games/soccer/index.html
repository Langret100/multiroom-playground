<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>⚽ 수학축구</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; touch-action:none;
      -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
  html,body { width:100%; height:100%; background:#0b1220; overflow:hidden;
      font-family:'Segoe UI',system-ui,sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  #gc { background:#1f7a3d; display:block; touch-action:none; }
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:14px; background:rgba(0,0,0,.72); color:#fff;
    text-align:center; padding:24px; z-index:20;
  }
  #overlay.hidden { display:none; }
  #overlay h2 { font-size:22px; }
  #overlay p { font-size:14px; opacity:.85; line-height:1.6; }
  #joy {
    position:fixed; left:22px; bottom:22px; width:120px; height:120px; border-radius:50%;
    background:rgba(255,255,255,.14); border:2px solid rgba(255,255,255,.35); z-index:15; display:none;
  }
  #joyStick {
    position:absolute; left:50%; top:50%; width:52px; height:52px; margin:-26px 0 0 -26px;
    border-radius:50%; background:rgba(255,255,255,.55);
  }
  body.mobile #joy { display:block; }
</style>
</head>
<body>
<div id="wrap"><canvas id="gc"></canvas></div>
<div id="joy"><div id="joyStick"></div></div>
<div id="overlay"><h2 id="ovTitle">연결 대기 중...</h2><p id="ovText">잠시만 기다려주세요.</p></div>

<script>
'use strict';

/* ── 임베드/브릿지 (투게스터와 동일한 방식) ─────────────────────────────
 * room.js가 iframe을 열 때 항상 ?embed=1 을 URL에 심어준다. window.self
 * !== window.top 같은 런타임 판정은 일부 모바일 인앱브라우저/웹뷰에서
 * 신뢰할 수 없어서 쓰지 않는다 — 이 값이 어긋나면 아래 두 함수가 통째로
 * 아무 것도 보내지 않게 되어 "상대가 안 보이고 공도 안 움직이는" 증상으로
 * 이어진다.
 */
const EMBED = new URLSearchParams(location.search).get('embed') === '1';
const IS_MOBILE = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || 'ontouchstart' in window;
if (IS_MOBILE) document.body.classList.add('mobile');

function bridgeSend(type, payload={}){
  if (!EMBED) return;
  try{ parent.postMessage({ type, ...payload }, '*'); }catch(_){}
}

/* ── 캔버스 / 필드 좌표계 (고정 논리좌표, CSS로만 스케일) ── */
const CW=900, CH=560;
const FX=40, FY=54, FW=820, FH=452;
const GOAL_W=14, GOAL_H=130;
const GOAL_Y1 = FY+FH/2-GOAL_H/2, GOAL_Y2 = FY+FH/2+GOAL_H/2;
const PR=17, BR=11;

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
function resize(){
  const wrap = document.getElementById('wrap');
  const vw = wrap.clientWidth, vh = wrap.clientHeight;
  const scale = Math.min(vw/CW, vh/CH);
  canvas.width = CW; canvas.height = CH;
  canvas.style.width = (CW*scale)+'px';
  canvas.style.height = (CH*scale)+'px';
}
window.addEventListener('resize', resize, { passive:true });
resize();

/* ── 입력 ── */
const keys = {};
window.addEventListener('keydown', e=>{ keys[e.code]=true; }, { passive:true });
window.addEventListener('keyup',   e=>{ keys[e.code]=false; }, { passive:true });

let joyDX=0, joyDY=0, joyTouchId=null;
const joyEl = document.getElementById('joy'), joyStickEl = document.getElementById('joyStick');
function joyReset(){ joyDX=0; joyDY=0; joyStickEl.style.transform='translate(0,0)'; }
function joyHandle(t){
  const r = joyEl.getBoundingClientRect();
  const cx = r.left+r.width/2, cy = r.top+r.height/2;
  let dx=(t.clientX-cx)/(r.width/2), dy=(t.clientY-cy)/(r.height/2);
  const len=Math.hypot(dx,dy);
  if(len>1){ dx/=len; dy/=len; }
  joyDX=dx; joyDY=dy;
  joyStickEl.style.transform = `translate(${dx*34}px, ${dy*34}px)`;
}
joyEl.addEventListener('touchstart', e=>{
  const t=e.changedTouches[0]; joyTouchId=t.identifier; joyHandle(t); e.preventDefault();
}, { passive:false });
joyEl.addEventListener('touchmove', e=>{
  for(const t of e.changedTouches){ if(t.identifier===joyTouchId){ joyHandle(t); e.preventDefault(); } }
}, { passive:false });
window.addEventListener('touchend', e=>{
  for(const t of e.changedTouches){ if(t.identifier===joyTouchId){ joyTouchId=null; joyReset(); } }
}, { passive:true });
window.addEventListener('touchcancel', e=>{ joyTouchId=null; joyReset(); }, { passive:true });

/* ── 게임 상태 ── */
let mySid='', myNick='Player', mySeat=-1, isHost=false, roster=[];
let players={};      // sid -> {x,y,lx,ly,vx,vy,seat,team,nick,color}
let me=null;
let ball={x:FX+FW/2,y:FY+FH/2,vx:0,vy:0};
let netBall={...ball};
let score={A:0,B:0};
let startTs=0, durationMs=120000;
let gameInitialized=false, gameActive=false, gameOver=false;
let lastPosSent=0, lastBallSent=0;

function clamp(v,lo,hi){ return v<lo?lo:(v>hi?hi:v); }
function lerp(a,b,t){ return a+(b-a)*t; }
function teamOf(seat){ return (Number(seat)||0)%2===0 ? 'A' : 'B'; }
function colorOf(team){ return team==='A' ? '#e74c3c' : '#3b82f6'; }

function getSpawn(seat){
  const team = teamOf(seat);
  const idx = Math.floor((Number(seat)||0)/2); // 같은 팀 내 순번
  const laneY = FY + FH*0.30 + idx*90;
  const x = team==='A' ? FX+FW*0.28 : FX+FW*0.72;
  return { x, y: clamp(laneY, FY+PR+4, FY+FH-PR-4) };
}

function resetKickoff(){
  ball = { x:FX+FW/2, y:FY+FH/2, vx:0, vy:0 };
  netBall = { ...ball };
  for(const p of Object.values(players)){
    const sp = getSpawn(p.seat);
    p.x=sp.x; p.y=sp.y; p.lx=sp.x; p.ly=sp.y; p.vx=0; p.vy=0;
  }
}

function initGame(){
  if (!roster.length) return;
  players = {};
  for (const p of roster){
    const team = teamOf(p.seat);
    const sp = getSpawn(p.seat);
    players[p.sid] = { x:sp.x, y:sp.y, lx:sp.x, ly:sp.y, vx:0, vy:0,
      seat:p.seat, team, nick:p.nick, color: colorOf(team) };
  }
  me = players[mySid] || null;
  score = { A:0, B:0 };
  ball = { x:FX+FW/2, y:FY+FH/2, vx:0, vy:0 };
  netBall = { ...ball };
  gameOver = false;
  gameActive = true;
  hideOverlay();
  startLoop();
}

function mergeNewRosterPlayers(){
  let added = false;
  for (const p of roster){
    if (players[p.sid]) continue;
    const team = teamOf(p.seat);
    const sp = getSpawn(p.seat);
    players[p.sid] = { x:sp.x, y:sp.y, lx:sp.x, ly:sp.y, vx:0, vy:0,
      seat:p.seat, team, nick:p.nick, color: colorOf(team) };
    added = true;
  }
  if (added && !me) me = players[mySid] || null;
}

function applyRemotePlayers(map){
  if (!map) return;
  for (const [sid, snap] of Object.entries(map)){
    if (sid === mySid) continue;
    let p = players[sid];
    if (!p){
      const seat = Number(snap.seat ?? -1);
      if (seat < 0) continue;
      const team = teamOf(seat);
      const sp = getSpawn(seat);
      p = players[sid] = { x:sp.x, y:sp.y, lx:sp.x, ly:sp.y, vx:0, vy:0,
        seat, team, nick:snap.nick || 'Player', color: colorOf(team) };
    }
    p.lx = Number(snap.x ?? p.lx);
    p.ly = Number(snap.y ?? p.ly);
    p.vx = Number(snap.vx ?? 0);
    p.vy = Number(snap.vy ?? 0);
  }
}

function hideOverlay(){ document.getElementById('overlay').classList.add('hidden'); }
function showOverlay(title, text){
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovText').textContent = text || '';
  document.getElementById('overlay').classList.remove('hidden');
}

/* ── 매 프레임 갱신 ── */
function updateMe(){
  if (!me || !gameActive || gameOver) return;
  let dx=0, dy=0;
  if (keys['ArrowLeft']||keys['KeyA']) dx-=1;
  if (keys['ArrowRight']||keys['KeyD']) dx+=1;
  if (keys['ArrowUp']||keys['KeyW']) dy-=1;
  if (keys['ArrowDown']||keys['KeyS']) dy+=1;
  if (IS_MOBILE && (Math.abs(joyDX)>0.12 || Math.abs(joyDY)>0.12)){ dx=joyDX; dy=joyDY; }
  const len = Math.hypot(dx,dy);
  if (len>0){ dx/=len; dy/=len; }
  const SPD = 3.6;
  me.vx = dx*SPD; me.vy = dy*SPD;
  me.x = clamp(me.x+me.vx, FX+PR, FX+FW-PR);
  me.y = clamp(me.y+me.vy, FY+PR, FY+FH-PR);
}

function lerpRemote(){
  for (const [sid,p] of Object.entries(players)){
    if (sid===mySid) continue;
    p.x = lerp(p.x, p.lx, 0.28);
    p.y = lerp(p.y, p.ly, 0.28);
  }
}

/* 공은 호스트만 물리 계산을 하고(권위), 나머지는 sc_ball 수신값을 그대로
   보간 표시만 한다 — 투게스터가 박스/퍼즐 상태를 다루는 방식과 동일한
   "한쪽만 계산, 나머지는 받아서 보간" 패턴. */
const MAX_BALL_SPEED = 11;
function updateBallHost(){
  if (!isHost || !gameActive || gameOver) return;

  for (const p of Object.values(players)){
    const dx = ball.x-p.x, dy = ball.y-p.y;
    const d = Math.hypot(dx,dy) || 0.0001;
    const minD = PR+BR;
    if (d < minD){
      const nx = dx/d, ny = dy/d;
      ball.x = p.x + nx*minD;
      ball.y = p.y + ny*minD;
      const speed = Math.hypot(p.vx||0, p.vy||0);
      const kick = Math.max(speed*2.1, 1.4);
      ball.vx += nx*kick;
      ball.vy += ny*kick;
    }
  }

  ball.x += ball.vx; ball.y += ball.vy;
  ball.vx *= 0.985; ball.vy *= 0.985;
  const bs = Math.hypot(ball.vx, ball.vy);
  if (bs > MAX_BALL_SPEED){ ball.vx *= MAX_BALL_SPEED/bs; ball.vy *= MAX_BALL_SPEED/bs; }

  if (ball.y-BR < FY){ ball.y = FY+BR; ball.vy = Math.abs(ball.vy)*0.6; }
  if (ball.y+BR > FY+FH){ ball.y = FY+FH-BR; ball.vy = -Math.abs(ball.vy)*0.6; }

  if (ball.x-BR < FX){
    if (ball.y > GOAL_Y1 && ball.y < GOAL_Y2) scoreGoal('B');
    else { ball.x = FX+BR; ball.vx = Math.abs(ball.vx)*0.6; }
  }
  if (ball.x+BR > FX+FW){
    if (ball.y > GOAL_Y1 && ball.y < GOAL_Y2) scoreGoal('A');
    else { ball.x = FX+FW-BR; ball.vx = -Math.abs(ball.vx)*0.6; }
  }
}

let goalPending = false;
function scoreGoal(team){
  if (goalPending) return;
  goalPending = true;
  if (team==='A') score.A++; else score.B++;
  bridgeSend('sc_goal', { team, scoreA:score.A, scoreB:score.B });
  showGoalFlash(team);
  setTimeout(()=>{ resetKickoff(); goalPending=false; }, 900);
}

let goalFlashUntil=0, goalFlashTeam=null;
function showGoalFlash(team){ goalFlashTeam=team; goalFlashUntil=Date.now()+900; }

/* ── 네트워크 송신 ── */
function netSends(){
  if (!EMBED || !gameActive) return;
  const now = Date.now();
  if (me && now-lastPosSent >= 40){
    lastPosSent = now;
    bridgeSend('sc_pos', { x:me.x, y:me.y, vx:me.vx, vy:me.vy });
  }
  if (isHost && now-lastBallSent >= 34){
    lastBallSent = now;
    bridgeSend('sc_ball', { x:ball.x, y:ball.y, vx:ball.vx, vy:ball.vy, owner:null });
  }
}

/* ── 타이머 ── */
let overSent = false;
function checkTimer(){
  if (!gameActive || gameOver || startTs<=0) return;
  const left = durationMs - (Date.now()-startTs);
  if (left <= 0 && isHost && !overSent){
    overSent = true;
    const winner = score.A===score.B ? 'draw' : (score.A>score.B ? 'A' : 'B');
    bridgeSend('sc_over', { winner, scoreA:score.A, scoreB:score.B });
  }
}

/* ── 렌더링 ── */
function drawField(){
  ctx.fillStyle = '#0b1220';
  ctx.fillRect(0,0,CW,CH);

  ctx.fillStyle = '#1f7a3d';
  ctx.fillRect(FX,FY,FW,FH);
  for(let i=0;i<10;i++){
    ctx.fillStyle = i%2===0 ? 'rgba(255,255,255,.035)' : 'rgba(0,0,0,.035)';
    ctx.fillRect(FX+FW*i/10, FY, FW/10, FH);
  }

  ctx.strokeStyle = 'rgba(255,255,255,.85)'; ctx.lineWidth = 3;
  ctx.strokeRect(FX,FY,FW,FH);
  ctx.beginPath(); ctx.moveTo(FX+FW/2,FY); ctx.lineTo(FX+FW/2,FY+FH); ctx.stroke();
  ctx.beginPath(); ctx.arc(FX+FW/2, FY+FH/2, 54, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.arc(FX+FW/2, FY+FH/2, 3, 0, Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();

  // 골대
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.fillRect(FX-GOAL_W, GOAL_Y1, GOAL_W, GOAL_H);
  ctx.fillRect(FX+FW,     GOAL_Y1, GOAL_W, GOAL_H);
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2;
  ctx.strokeRect(FX-GOAL_W, GOAL_Y1, GOAL_W, GOAL_H);
  ctx.strokeRect(FX+FW,     GOAL_Y1, GOAL_W, GOAL_H);
}

function drawPlayer(p, mine){
  ctx.save();
  ctx.beginPath(); ctx.ellipse(p.x, p.y+PR*0.75, PR*0.9, PR*0.32, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fill();

  ctx.beginPath(); ctx.arc(p.x,p.y,PR,0,Math.PI*2);
  ctx.fillStyle = p.color; ctx.fill();
  ctx.lineWidth = mine ? 3.5 : 2;
  ctx.strokeStyle = mine ? '#fff' : 'rgba(255,255,255,.55)';
  ctx.stroke();

  ctx.fillStyle='#fff'; ctx.font='11px sans-serif'; ctx.textAlign='center';
  ctx.fillText((p.nick||'').slice(0,8), p.x, p.y-PR-8);
  ctx.restore();
}

function drawBall(b){
  ctx.save();
  ctx.beginPath(); ctx.ellipse(b.x, b.y+BR*0.7, BR*0.85, BR*0.3, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.fill();
  ctx.beginPath(); ctx.arc(b.x,b.y,BR,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.lineWidth=1.5; ctx.strokeStyle='#222'; ctx.stroke();
  ctx.restore();
}

function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.fillRect(0,0,CW,FY-4);
  ctx.font='bold 22px sans-serif'; ctx.textBaseline='middle';
  ctx.fillStyle='#ff6b6b'; ctx.textAlign='left';  ctx.fillText('A '+score.A, 16, (FY-4)/2);
  ctx.fillStyle='#5b9dff'; ctx.textAlign='right'; ctx.fillText(score.B+' B', CW-16, (FY-4)/2);
  ctx.fillStyle='#fff'; ctx.textAlign='center';
  let sec = Math.max(0, Math.ceil((durationMs-(Date.now()-startTs))/1000));
  if (!startTs) sec = Math.ceil(durationMs/1000);
  const mm = String(Math.floor(sec/60)).padStart(2,'0');
  const ss = String(sec%60).padStart(2,'0');
  ctx.fillText(mm+':'+ss, CW/2, (FY-4)/2);
}

function drawGoalFlash(){
  if (!goalFlashTeam || Date.now()>goalFlashUntil) { goalFlashTeam=null; return; }
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = goalFlashTeam==='A' ? '#e74c3c' : '#3b82f6';
  ctx.fillRect(0,0,CW,CH);
  ctx.globalAlpha = 1;
  ctx.fillStyle='#fff'; ctx.font='bold 46px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('GOAL!', CW/2, CH/2);
  ctx.restore();
}

function draw(){
  drawField();
  for (const [sid,p] of Object.entries(players)) if (sid!==mySid) drawPlayer(p, false);
  if (me) drawPlayer(me, true);
  drawBall(isHost ? ball : netBall);
  drawHUD();
  drawGoalFlash();
}

/* ── 게임 루프 (프레임 하나의 예외가 루프 전체를 죽이지 않도록 격리) ── */
let loopRunning = false;
function startLoop(){
  if (loopRunning) return; loopRunning = true;
  function tick(){
    try{
      updateMe(); lerpRemote(); updateBallHost(); netSends(); checkTimer(); draw();
    }catch(err){
      try{ console.error('[soccer] frame error (자동 복구됨):', err); }catch(_){}
    }
    requestAnimationFrame(tick);
  }
  tick();
}

/* ── 브릿지 메시지 수신 ── */
window.addEventListener('message', e=>{
  const d = e.data;
  if (!d || typeof d !== 'object') return;

  if (d.type === 'bridge_init'){
    mySid = String(d.sessionId||'');
    myNick = String(d.nick||'Player');
    mySeat = Number(d.seat ?? -1);
    isHost = !!d.isHost;
    roster = (d.players||[]).map(p=>({
      sid: String(p.sid||p.sessionId||''),
      nick: String(p.nick||'Player'),
      seat: Number(p.seat ?? -1),
    })).filter(p=>p.seat>=0);

    if (gameInitialized){ mergeNewRosterPlayers(); return; }
    gameInitialized = true;
    const sAt = Number(d.startedAt||0);
    startTs = sAt>0 ? sAt : Date.now();
    initGame();
    bridgeSend('sc_sync', {});
    return;
  }

  if (d.type === 'sc_timer'){
    const t = Number(d.startTs||0);
    if (t>0) startTs = t;
    if (d.durationMs) durationMs = Number(d.durationMs);
    return;
  }

  if (d.type === 'sc_players'){
    applyRemotePlayers(d.players);
    return;
  }

  if (d.type === 'sc_ball'){
    netBall.x = Number(d.x ?? netBall.x);
    netBall.y = Number(d.y ?? netBall.y);
    netBall.vx = Number(d.vx ?? 0);
    netBall.vy = Number(d.vy ?? 0);
    return;
  }

  if (d.type === 'sc_goal' || d.type === 'sc_goal_sync'){
    score.A = Number(d.scoreA ?? score.A);
    score.B = Number(d.scoreB ?? score.B);
    if (d.type === 'sc_goal' && !isHost) showGoalFlash(d.team);
    return;
  }

  if (d.type === 'sc_roster'){
    roster = (d.players||[]).map(p=>({
      sid: String(p.sid||p.sessionId||''),
      nick: String(p.nick||'Player'),
      seat: Number(p.seat ?? -1),
    })).filter(p=>p.seat>=0);
    if (gameInitialized) mergeNewRosterPlayers();
    return;
  }

  if (d.type === 'sc_end'){
    gameOver = true; gameActive = false;
    const a = Number(d.scoreA ?? score.A), b = Number(d.scoreB ?? score.B);
    const winner = d.winner || (a===b ? 'draw' : (a>b?'A':'B'));
    const msg = winner==='draw' ? '무승부!' : (winner==='A' ? '🔴 A팀 승리!' : '🔵 B팀 승리!');
    showOverlay(msg, `최종 스코어  A ${a} : ${b} B`);
    return;
  }
});

bridgeSend('bridge_ready', {});
</script>
</body>
</html>
