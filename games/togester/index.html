<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>🐹 투게스터 - 협동 플랫폼 게임</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Black+Han+Sans&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Jua', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #lobby {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        #lobby.hidden {
            display: none;
        }
        
        .lobby-title {
            font-family: 'Black Han Sans', sans-serif;
            font-size: clamp(2rem, 8vw, 4rem);
            color: #fff;
            text-shadow: 4px 4px 0 #e94560, 8px 8px 0 rgba(0,0,0,0.2);
            margin-bottom: 10px;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .lobby-subtitle {
            color: rgba(255,255,255,0.9);
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin-bottom: 30px;
        }
        
        .cat-parade {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .cat-preview {
            width: 50px;
            height: 55px;
            animation: parade 0.5s ease infinite alternate;
        }
        
        .cat-preview:nth-child(2) { animation-delay: 0.1s; }
        .cat-preview:nth-child(3) { animation-delay: 0.2s; }
        .cat-preview:nth-child(4) { animation-delay: 0.3s; }
        
        @keyframes parade {
            from { transform: translateY(0) rotate(-5deg); }
            to { transform: translateY(-10px) rotate(5deg); }
        }
        
        .input-group {
            margin-bottom: 15px;
            width: 100%;
            max-width: 300px;
        }
        
        .input-group label {
            display: block;
            color: rgba(255,255,255,0.9);
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-family: 'Jua', sans-serif;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .btn {
            padding: 15px 40px;
            font-size: 1.1rem;
            font-family: 'Black Han Sans', sans-serif;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .btn-create {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }
        
        .btn-join {
            background: linear-gradient(135deg, #e17055 0%, #d63031 100%);
            color: white;
        }
        
        .btn-guest {
            background: linear-gradient(135deg, #a29bfe 0%, #6c5ce7 100%);
            color: white;
            width: 100%;
            max-width: 280px;
        }
        
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        
        .btn:active {
            transform: translateY(0) scale(0.98);
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #gameHeader {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 8px 10px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
            z-index: 100;
        }

        #gameHeader > * { white-space: nowrap; }

        .header-right{
            display:flex;
            align-items:center;
            gap:8px;
            flex-wrap:nowrap;
        }

        .exit-btn{
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.22);
            color: #fff;
            padding: 6px 10px;
            border-radius: 14px;
            font-family: 'Jua', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .exit-btn:active{ transform: scale(0.98); }

        @media (max-width: 420px){
            .room-code{ display:none; }
            .exit-btn{ padding: 6px 8px; font-size: 0.8rem; }
            .level-info{ font-size: 0.85rem; }
        }

        
        .room-code {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            color: #fff;
            font-size: 0.9rem;
        }
        
        .level-info {
            color: #ffd700;
            font-size: 0.9rem;
        }
        
        .death-count {
            color: #ff6b6b;
            font-size: 0.82rem;
            background: rgba(255,107,107,0.2);
            padding: 3px 8px;
            border-radius: 10px;
        }
        
        #gameCanvas {
            flex: 1;
            width: 100%;
        }
        
        #playerList {
            position: absolute;
            top: 60px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 10px;
            z-index: 100;
        }
        
        .player-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
            color: white;
            font-size: 0.85rem;
        }
        
        .player-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        /* #controls-hint removed (controls shown in room creation UI) */
        #winScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        #winScreen.show {
            display: flex;
        }
        
        .win-text {
            font-family: 'Black Han Sans', sans-serif;
            font-size: clamp(2rem, 10vw, 5rem);
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            animation: pulse 0.5s ease infinite alternate;
        }
        
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        
        .firebase-config {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            max-width: 300px;
            width: 100%;
        }
        
        .firebase-config summary {
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .firebase-config input {
            width: 100%;
            padding: 8px 12px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.9);
        }
        
        .error-msg {
            color: #ff6b6b;
            background: rgba(255,107,107,0.2);
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
    

        /* Action buttons (right side) */
        #actionButtons{
            position: absolute;
            right: 14px;
            bottom: 92px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 200;
            pointer-events: auto;
        }
        .action-btn{
            width: 68px;
            height: 68px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.16);
            color: #fff;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 0.98rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.22);
            touch-action: manipulation;
            user-select: none;
        }
        .action-btn:active{
            transform: scale(0.96);
        }

        /* Screen shake on death */
        @keyframes tgShake {
            0% { transform: translate3d(0,0,0); }
            15% { transform: translate3d(-10px, 6px, 0); }
            30% { transform: translate3d(9px, -7px, 0); }
            45% { transform: translate3d(-8px, -5px, 0); }
            60% { transform: translate3d(7px, 6px, 0); }
            75% { transform: translate3d(-6px, 4px, 0); }
            100% { transform: translate3d(0,0,0); }
        }
        #gameContainer.screen-shake{
            animation: tgShake 260ms linear;
        }

    </style>
</head>
<body>

        <p class="lobby-subtitle">최대 4명이 함께하는 협동 플랫폼 게임!</p>

                <circle cx="15" cy="19" r="1" fill="white"/>

                <ellipse cx="9" cy="26" rx="5" ry="4" fill="#ffb8b8" opacity="0.7"/>

            </svg>
            <svg class="cat-preview" viewBox="0 0 40 40">
                <circle cx="20" cy="22" r="16" fill="#a29bfe"/>

                <circle cx="32" cy="10" r="6" fill="#a29bfe"/>

        </div>
        
        <div class="input-group">
            <label>닉네임</label>
            <input type="text" id="playerName" placeholder="햄스터 이름을 입력하세요" maxlength="10">

        <div class="input-group">
            <label>방 코드 (참가시)</label>
            <input type="text" id="roomCode" placeholder="방 코드 입력" maxlength="6" style="text-transform: uppercase;">
        </div>
        
        <div>
            <button class="btn btn-create" onclick="createRoom()">🏠 방 만들기</button>

        <div style="margin-top: 15px;">
            <button class="btn btn-guest" onclick="startGuestMode()">🎮 혼자 연습하기</button>

        <div id="errorMsg" class="error-msg"></div>

        <div style="margin-top:12px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,0.08);font-size:0.9rem;line-height:1.45;color:#eef;">
            <div style="font-weight:700;margin-bottom:6px;">조작 설명</div>
            <div>모바일: 화면 터치 시 위치에 가상 조이스틱 생성(이동), 우측 버튼으로 <b>밀기 / 바닥생성 / 점프</b></div>

    <!-- 게임 화면 -->
    <div id="gameContainer" style="display:none;">
        <div id="gameHeader">
            <span class="room-code" id="displayRoomCode">⏱ 120</span>
            <span class="level-info" id="levelInfo">레벨 1</span>
            <div class="header-right">
                <span class="death-count" id="deathCount">💀 0</span>
                <button class="exit-btn" id="exitBtn" type="button">나가기</button>

        <canvas id="gameCanvas"></canvas>
        
        <div id="playerList"></div>

        <div id="actionButtons" aria-label="액션 버튼">
            <button id="pushBtn" class="action-btn" type="button" title="앞에 있는 캐릭터를 밀기">밀기</button>
            <button id="floorBtn" class="action-btn" type="button" title="발 아래에 발판 생성">바닥 2/2</button>

    <!-- 승리 화면 -->
    <div id="winScreen">
        <div class="win-text">🎉 레벨 클리어! 🎉</div>
        <div id="autoNextHint" style="color: #aaa; margin-top: 15px; font-size: 0.9rem;">잠시 후 다음 레벨로...</div>
    </div>

    <!-- 배경음악 (게임 진행 중 반복 재생) -->
    <audio id="bgm" src="togestermusic.mp3" loop preload="auto"></audio>
<script>
        // ==================== 설정 ====================
        // Firebase 의존성 제거 (Colyseus/부모 브릿지로 동기화)
        const EMBED = new URLSearchParams(location.search).get('embed') === '1';
        const EMBED_PRACTICE = EMBED && (new URLSearchParams(location.search).get('practice') === '1');
        function bridgeSend(type, payload){
            if (!EMBED) return;
            try { window.parent && window.parent.postMessage({ type, ...payload }, '*'); } catch(e){}
        }

        // 서버에 현재 발판 상태를 재요청 (초기 로딩 타이밍 메시지 유실 방지)
        function requestFloorSync(){
            if (!EMBED || isGuestMode) return;
            bridgeSend('tg_sync', {});
        }

        // 멀티(임베드)에서는 호스트만 상자 물리를 authoritative 하게 시뮬레이션한다.
        // practice(게스트모드) 여부와 무관하게, non-host는 서버/호스트 스냅샷을 따른다.
        function isAuthoritativeBoxSim(){
            return !EMBED || !!isHost;
        }
        function usesRemoteAuthoritativeBoxes(){
            if (!EMBED || isHost) return false;
            const now = performance.now();
            const recentPuzzle = (now - (lastTgPuzzleSnapshotAt || 0)) < 1800;
            const recentAnyNet = (now - (lastTgAnyNetAt || 0)) < 1800;
            // 로컬 테스트/브릿지 미연결 상태에서는 원격 스냅샷을 기다리다 박스가 멈춰보일 수 있으므로 폴백
            return recentPuzzle || recentAnyNet;
        }
        function isAuthoritativePuzzleSim(){
            return !EMBED || !!isHost;
        }

        // ==================== 게임 상태 ====================
        let db = null;
        let roomRef = null;
        let playerId = null;
        let roomId = null;
        let isHost = false;
        let isGuestMode = false;
        let currentLevel = 1;
        let levelClearLock = false; // 레벨 클리어 중복 트리거 방지
        let roundTimeLimitSec = 120;
        let roundDeadlineAt = 0;
        let roundTimedOut = false;
        
        const HAMSTER_COLORS = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#a29bfe'];
        // 기본 슈퍼마리오 느낌(스르륵 멈춤/부드러운 가속, 공중제어는 약간 약하게)
        // (단위: px/frame @60fps)
        const PHYS_SCALE = 1.0;
        // 기본 슈퍼마리오(SMB1) 느낌: 과속 방지 + 살짝 미끄러짐(스키드) + 낙하/점프 완만
        // (단위: px/frame @60fps)
        const GRAVITY = 0.32 * PHYS_SCALE;
        const MAX_FALL_SPEED = 6.9 * PHYS_SCALE;
        const MOVE_MAX_SPEED = 3.0 * PHYS_SCALE;
        const MOVE_ACCEL_GROUND = 0.30 * PHYS_SCALE;
        const MOVE_ACCEL_AIR = 0.20 * PHYS_SCALE;
        const MOVE_FRICTION_GROUND = 0.14 * PHYS_SCALE;
        const MOVE_FRICTION_AIR = 0.04 * PHYS_SCALE;
        const MOVE_SKID_DECEL = 0.60 * PHYS_SCALE;
        const JUMP_VELOCITY = -8.4 * PHYS_SCALE;
        // 가변 점프(짧게 누르면 낮게, 길게 누르면 높게)
        const JUMP_HOLD_MAX_MS = 150;
        const JUMP_HOLD_GRAVITY_MULT = 0.55;
        const JUMP_CUT_VY = -2.8 * PHYS_SCALE;
        const RESPAWN_COOLDOWN_MS = 1500; // 1.5초
        const PUSH_IMPULSE_X = 16;
        const PUSH_IMPULSE_Y = -14;
        const PUSH_HITBOX_OFFSET_PX = 10; // player front edge +10px
        const PUSH_HITBOX_WIDTH = 140; // big hitbox (wide)
        const PUSH_HITBOX_HEIGHT = 44;
        const PUSH_HITBOX_Y_OFFSET = 6; // lower band (avoid hitting above)
        const FLOOR_COOLDOWN_MS = 220;
        const PUSH_ANIM_MS = 180; // push animation duration
        // Player-vs-player collision box is slimmer than the tile/platform box (matches sprite better)
        const PVP_PAD_X = 4;
        const PVP_W = 32;
        const PVP_H = 40;
        
        let localPlayer = {
            x: 100,
            y: 300,
            vx: 0,
            vy: 0,
            color: HAMSTER_COLORS[0],
            name: '햄찌',
            onGround: false,
            onButton: false,
            isDead: false,
            facing: 1,
            variant: 0,
            jumpUsed: false,
            deadAt: 0,
            nextRespawnAt: 0,
            pushAnimUntil: 0,
            knockbackUntil: 0,
            knockbackVx: 0,
            noHeadBlockUntil: 0,
            noHeadBlockSids: []
        };
        
        let players = {};
        let smoothedPlayers = {};
        let lastPlayerListSig = '';
        let tgFloors = {}; // id -> platform (temporary floors)
        // 발판(임시 바닥) 동기화가 초기 로딩 타이밍에 유실되지 않도록 버퍼
        let pendingFloorFullSync = null; // Array<platform>
        let pendingBoxSnapshot = null; // { level, boxes } from host
        let pendingPuzzleSnapshot = null; // { level, ... } from host authoritative puzzle state

        (function attachBGMGestureRetry(){

        function initAudio() {
            if (!audioCtx) {

            }
        }
        
        function playTone(frequency, duration, type = 'square', volume = 0.3, slide = 0) {
            if (!audioCtx) return;
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            
            if (slide !== 0) {
                oscillator.frequency.linearRampToValueAtTime(frequency + slide, audioCtx.currentTime + duration);
            }
            
            gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + duration);
        }

        // 걷기 소리 (작은 발소리)
        let lastStepTime = 0;

        // 박스 밀기 소리

               // ==================== 모바일 세로 진행 레벨 ====================
        // 20라운드: 맵 반복 없이, 라운드가 올라갈수록 함정/퍼즐 난이도가 증가하도록 구성
        // (기존: 8개 맵 반복 -> 개선: 25개 맵을 결정론적으로 생성)

        const TG_STAGE_W = 520;
        const TG_GROUND_Y = 2400;
        const TG_TOP_GOAL_Y = 90;

        function _lerp(a,b,t){ return a + (b-a)*t; }
        function _mulberry32(a){
            return function(){
                let t = a += 0x6D2B79F5;
                t = Math.imul(t ^ (t >>> 15), t | 1);
                t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
                return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
            };
        }
        function _rint(rng, a, b){
            a = Math.floor(a); b = Math.floor(b);
            return a + Math.floor(rng() * (b - a + 1));
        }
        function _rfloat(rng, a, b){ return a + rng() * (b - a); }
        function _pick(rng, arr){ return arr[Math.floor(rng() * arr.length)]; }

        function _addPlatform(platforms, x, y, w, h=20, color='#636e72'){
            platforms.push({ x: Math.round(x), y: Math.round(y), width: Math.round(w), height: Math.round(h), color });
        }

        function _buttonOn(platformY){
            // 버튼은 플랫폼 상단에 '올려놓는' 형태 (기존 맵과 동일한 방식)
            return Math.round(platformY - 12);
        }

        function _chunkStairs({rng, platforms, y, step, wMin, wMax}){
            // 3단 지그재그
            const sides = [60, 260];
            let side = rng() < 0.5 ? 0 : 1;
            for (let i=0;i<3;i++){
                const w = _rint(rng, wMin, wMax);
                const x = sides[side] + _rint(rng, -15, 15);
                _addPlatform(platforms, clamp(x, 20, TG_STAGE_W - w - 20), y - i*step, w, 20);
                side = 1 - side;
            }
            return y - step*3;
        }

        function _chunkSpike({rng, platforms, spikes, y, step, wMin, wMax, diff}){
            // 중앙 스파이크 + 좌/우 발판
            const y1 = y - step;
            const y2 = y - step*2;
            const leftW = _rint(rng, wMin, wMax);
            const rightW = _rint(rng, wMin, wMax);
            _addPlatform(platforms, 35, y1, leftW, 20);
            _addPlatform(platforms, TG_STAGE_W - 35 - rightW, y1, rightW, 20);
            _addPlatform(platforms, 120 + _rint(rng,-25,25), y2, _rint(rng, wMin, wMax), 20);

            const spikeW = Math.round(_lerp(160, 300, diff));
            const spikeX = Math.round((TG_STAGE_W - spikeW)/2 + _rint(rng, -20, 20));
            spikes.push({ x: clamp(spikeX, 30, TG_STAGE_W - spikeW - 30), y: y1 + 18, width: spikeW, height: 40 });
            if (diff > 0.55 && rng() < 0.55){
                const spikeW2 = Math.round(_lerp(120, 260, diff));
                const spikeX2 = _rint(rng, 40, TG_STAGE_W - spikeW2 - 40);
                spikes.push({ x: spikeX2, y: y2 + 18, width: spikeW2, height: 40 });
            }
            return y - step*3;
        }

        function _chunkDoor({rng, platforms, doors, buttons, y, step, wMin, wMax, diff}){
            // 전체 폭 문 + 버튼(협동)
            const yApproach = y - step;
            const yDoor = y - step*2 + 10;
            // 접근 발판
            _addPlatform(platforms, 120 + _rint(rng,-25,25), yApproach, _rint(rng, wMin, wMax), 20);
            // 문 (전체 폭)
            doors.push({ x: 0, y: yDoor, width: TG_STAGE_W, height: 30, open: false, color: '#d63031' });

            const btnSideLeft = rng() < 0.5;
            const btnPlatW = _rint(rng, 140, 190);
            const btnPlatX = btnSideLeft ? 35 : (TG_STAGE_W - 35 - btnPlatW);
            const btnPlatY = yApproach + _rint(rng, 70, 110);
            _addPlatform(platforms, btnPlatX, btnPlatY, btnPlatW, 20);
            buttons.push({ x: btnSideLeft ? 55 : (TG_STAGE_W - 55 - 70), y: _buttonOn(btnPlatY), width: 70, height: 12, pressed: false, doorId: doors.length-1, color: '#e17055' });

            // 문 위쪽 진행 발판
            const topW = _rint(rng, wMin, wMax);
            _addPlatform(platforms, 120 + _rint(rng,-25,25), yDoor - 90, topW, 20);

            // 후반 난이도: 2단 문

                _addPlatform(platforms, 140, yDoor2 - 90, _rint(rng, wMin, wMax), 20);

            return y - step*3;

        function _chunkBridge({rng, platforms, bridges, buttons, spikes, y, step, diff}){
            const yGap = y - step;
            _addPlatform(platforms, 40, yGap, 160, 20);

        function _chunkLift({rng, platforms, lifts, buttons, spikes, y, step, diff}){
            // 버튼 누르는 동안만 올라가는 리프트
            const bottomY = y - _rint(rng, 0, 10);

            _addPlatform(platforms, 250 + _rint(rng,-20,20), topY - 60, 220, 20);

            // 후반: 리프트 아래에 스파이크 압박
            if (diff > 0.6 && rng() < 0.65){
                spikes.push({ x: 250, y: bottomY + 45, width: 220, height: 40 });
            }

            return y - step*3;
        }

        function _chunkBox({rng, platforms, doors, buttons, boxes, spikes, y, step, diff}){
            // 상자(수단)로 버튼을 눌러 문을 열기
            const yApproach = y - step;

        function _chunkGap({rng, platforms, spikes, y, step, diff}){
            // 큰 갭: 점프만으로는 빡빡(바닥 1~2개 활용하면 쉬워짐)

        function _chunkRelayPuzzle({rng, platforms, doors, buttons, bridges, lifts, spikes, y, step, diff}){
            // 협동 릴레이 퍼즐: 버튼1(다리) -> 버튼2(문) -> 버튼3(리프트)

            if (diff > 0.65) spikes.push({ x: 205, y: yC + 104, width: 120, height: 34 });

        function _chunkSplitDual({rng, platforms, doors, buttons, bridges, y, step, diff}){
            const y0 = y - step;

        function _chunkBoxRelay({rng, platforms, doors, buttons, boxes, lifts, spikes, y, step, diff}){
            const yA = y - step; const yB = y - step*2; const yC = y - step*3;
            _addPlatform(platforms, 90, yA, 300, 20);
            boxes.push({ x: 210, y: yA - 40, width:40, height:40 });
            const pocketX = (rng() < 0.5) ? 40 : 330;
            _addPlatform(platforms, pocketX, yA + 120, 150, 20);
            doors.push({ x:0, y:yB, width:TG_STAGE_W, height:26, open:false, color:'#d35400' });
            buttons.push({ x:pocketX + 40, y:_buttonOn(yA + 120), width:70, height:12, pressed:false, doorId: doors.length-1, color:'#fdcb6e' });
            _addPlatform(platforms, 150, yB - 85, 220, 20);
            lifts.push({ x: 350, y: yC + 80, width: 120, height: 20, minY: yC - 90, maxY: yC + 80, speed: _lerp(2.5,3.7,diff), color:'#6c5ce7' });
            _addPlatform(platforms, 55, yC + 155, 170, 20);
            buttons.push({ x: 105, y: _buttonOn(yC + 155), width:70, height:12, pressed:false, liftId: lifts.length-1, color:'#a29bfe' });
            _addPlatform(platforms, 220, yC - 120, 220, 20);
            if (diff > 0.5) spikes.push({ x: 155, y: yA + 42, width: 210, height: 34 });
            return y - step*4;
        }

        function _seqForLevel(lv, rng){
            const pick = (arr)=>_pick(rng, arr);
            // 마리오식 진행감: 소개 -> 안전 응용 -> 작은 테스트 -> 마무리
            if (lv <= 3) return ['stairs','stairs','stairs'];
            if (lv === 4) return ['stairs','bridge','stairs','gap','bridge'];
            if (lv === 5) return ['stairs','door','stairs','bridge','door'];
            if (lv === 6) return ['stairs','box','door','stairs','bridge'];
            if (lv === 7) return ['bridge','gap','lift','stairs','door'];
            if (lv === 8) return ['box','bridge','door','lift','stairs'];
            if (lv === 9) return ['relay','stairs','bridge','door','spike'];
            if (lv === 10) return ['split','bridge','lift','door','spike'];
            if (lv <= 14) return [pick(['relay','boxrelay']), pick(['door','box']), pick(['lift','bridge']), 'stairs', pick(['split','gap']), 'spike'];
            if (lv <= 17) return [pick(['door','box']), pick(['relay','split']), 'spike', pick(['boxrelay','lift']), 'stairs', pick(['door','gap'])];
            return [pick(['relay','split']), pick(['boxrelay','door']), 'spike', pick(['lift','bridge']), pick(['relay','boxrelay']), 'stairs', pick(['split','box']), pick(['door','gap'])];
        }

        function _genLevel(lv){
            const rng = _mulberry32(0x51F15 + lv * 1337);
            const diff = clamp((lv - 1) / 19, 0, 1);

            const step = Math.round(_lerp(170, 135, diff));
            const wMax = Math.round(_lerp(290, 175, diff));
            const wMin = Math.round(_lerp(210, 120, diff));

            const platforms = [];
            const spikes = [];
            const doors = [];
            const buttons = [];
            const boxes = [];
            const lifts = [];
            const bridges = [];
            if (lv === 1){
                // 튜토리얼 1: 매우 짧은 이동/점프 입문 (혼자 쉽게 가능)
                platforms.push({ x: 0, y: TG_GROUND_Y, width: TG_STAGE_W, height: 70, color: '#2d3436' });
                _addPlatform(platforms, 90, 2230, 260, 20);
                _addPlatform(platforms, 250, 2165, 170, 20);
                _addPlatform(platforms, 120, 2100, 180, 20);
                _addPlatform(platforms, 260, 2038, 150, 20);
                return {
                    spawn:{x:120,y:2320},
                    goal:{x:305,y:1948,width:90,height:80},
                    platforms, buttons, doors, spikes, boxes, lifts, bridges,
                    message:'튜토리얼 1: 이동/점프로 짧게 도착!'
                };
            }

            if (lv === 2){
                // 튜토리얼 2: 상자→버튼→다리 (혼자 안전하게 체험)
                platforms.push({ x: 0, y: TG_GROUND_Y, width: TG_STAGE_W, height: 70, color: '#2d3436' });
                _addPlatform(platforms, 80, 2230, 300, 20);
                _addPlatform(platforms, 70, 2145, 210, 20);
                boxes.push({ x: 220, y: 2105, width: 40, height: 40 });
                buttons.push({ x: 95, y: _buttonOn(2145), width: 70, height: 12, pressed: false, bridgeId: 0, color: '#00b894' });

                const yBridge = 2060;
                _addPlatform(platforms, 40, yBridge, 150, 20);
                bridges.push({ x: 190, y: yBridge, width: 140, height: 20, color: '#00cec9', active: false });
                _addPlatform(platforms, 330, yBridge, 150, 20);

                _addPlatform(platforms, 260, 1978, 170, 20);
                _addPlatform(platforms, 130, 1912, 170, 20);
                return {
                    spawn:{x:120,y:2320},
                    goal:{x:165,y:1822,width:95,height:80},
                    platforms, buttons, doors, spikes, boxes, lifts, bridges,
                    message:'튜토리얼 2: 상자를 버튼에 올리면 다리가 생겨요!'
                };
            }

            if (lv === 3){
                // 튜토리얼 3: 문/리프트를 순서대로 익히는 퍼즐 입문 (혼자 가능)
                platforms.push({ x: 0, y: TG_GROUND_Y, width: TG_STAGE_W, height: 70, color: '#2d3436' });
                _addPlatform(platforms, 70, 2230, 310, 20);

                // 1) 문 기믹 소개
                _addPlatform(platforms, 60, 2145, 190, 20);
                _addPlatform(platforms, 300, 2145, 150, 20);
                boxes.push({ x: 340, y: 2105, width: 40, height: 40 });
                buttons.push({ x: 92, y: _buttonOn(2145), width: 70, height: 12, pressed: false, doorId: 0, color: '#fdcb6e' });
                doors.push({ x: 210, y: 2066, width: 120, height: 24, open: false, color: '#d35400' });
                _addPlatform(platforms, 200, 2060, 150, 20);
                _addPlatform(platforms, 130, 1980, 200, 20);

                // 2) 리프트 기믹 소개
                _addPlatform(platforms, 55, 1905, 160, 20);
                buttons.push({ x: 82, y: _buttonOn(1905), width: 70, height: 12, pressed: false, liftId: 0, color: '#a29bfe' });
                boxes.push({ x: 165, y: 1865, width: 40, height: 40 });
                lifts.push({ x: 340, y: 1905, width: 110, height: 20, minY: 1795, maxY: 1905, speed: 2.2, color: '#6c5ce7' });
                _addPlatform(platforms, 235, 1755, 170, 20);
                return {
                    spawn:{x:120,y:2320},
                    goal:{x:270,y:1665,width:95,height:80},
                    platforms, buttons, doors, spikes, boxes, lifts, bridges,
                    message:'튜토리얼 3: 문과 리프트를 순서대로 사용해보세요!'
                };
            }

            // 바닥
            platforms.push({ x: 0, y: TG_GROUND_Y, width: TG_STAGE_W, height: 70, color: '#2d3436' });

            // 시작 높이
            let y = 2230;

            // 초반 안정 발판 1~2개
            for (let i=0;i<2;i++){
                const w = _rint(rng, wMin+30, wMax);
                const x = _rint(rng, 50, TG_STAGE_W - w - 50);
                _addPlatform(platforms, x, y - i*step, w, 20);
            }
            y -= step*2;

            const seq = _seqForLevel(lv, rng);
            for (const t of seq){
                if (t === 'stairs') y = _chunkStairs({rng, platforms, y, step, wMin, wMax});
                else if (t === 'spike') y = _chunkSpike({rng, platforms, spikes, y, step, wMin, wMax, diff});
                else if (t === 'door') y = _chunkDoor({rng, platforms, doors, buttons, y, step, wMin, wMax, diff});
                else if (t === 'bridge') y = _chunkBridge({rng, platforms, bridges, buttons, spikes, y, step, diff});
                else if (t === 'lift') y = _chunkLift({rng, platforms, lifts, buttons, spikes, y, step, diff});
                else if (t === 'box') y = _chunkBox({rng, platforms, doors, buttons, boxes, spikes, y, step, diff});
                else if (t === 'gap') y = _chunkGap({rng, platforms, spikes, y, step, diff});
                else if (t === 'relay') y = _chunkRelayPuzzle({rng, platforms, doors, buttons, bridges, lifts, spikes, y, step, diff});
                else if (t === 'split') y = _chunkSplitDual({rng, platforms, doors, buttons, bridges, y, step, diff});
                else if (t === 'boxrelay') y = _chunkBoxRelay({rng, platforms, doors, buttons, boxes, lifts, spikes, y, step, diff});
                else y = _chunkStairs({rng, platforms, y, step, wMin, wMax});

                // 라운드가 높을수록 쉬는 구간이 짧아짐: 추가 발판을 덜 줌
                if (diff < 0.18 && rng() < 0.45){
                    const w = _rint(rng, wMin+40, wMax);
                    const x = _rint(rng, 60, TG_STAGE_W - w - 60);
                    _addPlatform(platforms, x, y, w, 20);
                    y -= step;
                }
            }

            // 상단 정리 발판
            _addPlatform(platforms, 140, 220, 240, 20);
            _addPlatform(platforms, 120, 140, 280, 20);

            const spawn = { x: 120, y: 2320 };
            const goal  = { x: 200, y: TG_TOP_GOAL_Y, width: 110, height: 90 };

            return {
                spawn, goal,
                platforms,
                buttons,
                doors,
                spikes,
                boxes,
                lifts,
                bridges,
                message: ""
            };
        }

        const LEVELS = Array.from({ length: 20 }, (_, i) => _genLevel(i + 1));

// ==================== 라운드/맵 처리 ====================
        // 20라운드 고정: 맵 반복 없이(LEVELS=25), 라운드 표기로 진행
        const TG_MAP_COUNT = LEVELS.length;
        const TG_MAX_ROUNDS = TG_MAP_COUNT;
        const TG_ROUND_MODE = true;
        function getLevelForRound(roundNum){
            const n = Math.max(1, parseInt(roundNum, 10) || 1);
            const idx = clamp(n - 1, 0, Math.max(0, TG_MAP_COUNT - 1));
            return LEVELS[idx];
        }

        // ==================== 에러 표시 ====================

            setTimeout(() => el.classList.remove('show'), 3000);
        }
        
        // ==================== 방 관리 ====================
        function generateRoomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 5; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));

        }

        // ==================== 임베드 모드(Colyseus 브릿지) ====================
        function startEmbedded(init){
            isGuestMode = !!init.practice || EMBED_PRACTICE;
            isHost = !!init.isHost;

        // createRoom()/joinRoom()/Firebase 로직 제거: 외부 로비(Colyseus)에서 방/입장을 처리합니다.

        function getRoundTimeLeftSec(){
            if (!roundDeadlineAt) return roundTimeLimitSec;
            return Math.max(0, Math.ceil((roundDeadlineAt - performance.now()) / 1000));
        }

            const el = document.getElementById('displayRoomCode');

        function buildPlayerListSignature() {
            const parts = [`me:${localPlayer.name}|${localPlayer.color}|${isGuestMode ? '(P)' : '(M)'}`];
            if (!isGuestMode) {
                const arr = Object.values(players || {}).map(p => `${p?.name||''}|${p?.color||''}`).sort();
                parts.push(...arr);
            }
            return parts.join('||');
        }

        function updatePlayerList(force=false) {
            const container = document.getElementById('playerList');
            if (!container) return;

                    html += `<div class="player-item">
                        <div class="player-dot" style="background:${p.color}"></div>
                        <span>${p.name}</span>
                    </div>`;
                });
            }
            container.innerHTML = html;
        }
        
        // ==================== 게임 시작 ====================
        function startGame() {
            document.getElementById('lobby').classList.add('hidden');

            updateRoundTimerUI();
            
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

                    if (EMBED){
