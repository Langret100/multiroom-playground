                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(d.x, d.y, d.width, d.height);
                }
            });
            
            // 스파이크
            gameObjects.spikes.forEach(s => {
                ctx.fillStyle = '#e74c3c';
                const spikeCount = Math.floor(s.width / 15);
                for (let i = 0; i < spikeCount; i++) {
                    ctx.beginPath();
                    ctx.moveTo(s.x + i * 15, s.y + s.height);
                    ctx.lineTo(s.x + i * 15 + 7.5, s.y);
                    ctx.lineTo(s.x + i * 15 + 15, s.y + s.height);
                    ctx.fill();
                }
            });
            
            // 박스
            gameObjects.boxes.forEach(box => {
                // 그림자
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(box.x + 4, box.y + 4, box.width, box.height);
                
                // 박스 본체
                ctx.fillStyle = '#8b4513';
                ctx.fillRect(box.x, box.y, box.width, box.height);
                
                // 나무 무늬
                ctx.fillStyle = '#a0522d';
                ctx.fillRect(box.x + 3, box.y + 3, box.width - 6, 8);
                ctx.fillRect(box.x + 3, box.y + box.height - 11, box.width - 6, 8);
                
                // 하이라이트
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(box.x, box.y, box.width, 3);
                ctx.fillRect(box.x, box.y, 3, box.height);
                
                // 테두리
                ctx.strokeStyle = '#5c3317';
                ctx.lineWidth = 2;
                ctx.strokeRect(box.x, box.y, box.width, box.height);
            });
            
            // 골 - 깃발만 표시
            const goal = gameObjects.goal;
            const flagX = goal.x + goal.width / 2;
            const flagY = goal.y - 30; // 더 높게
            const flagHeight = goal.height + 30;
            
            // 깃발 기둥
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(flagX - 3, flagY, 6, flagHeight);
            
            // 깃발 천
            ctx.beginPath();
            ctx.moveTo(flagX + 3, flagY);
            ctx.lineTo(flagX + 45, flagY + 22);
            ctx.lineTo(flagX + 3, flagY + 44);
            ctx.closePath();
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            
            // 반짝이 파티클 2~3개 (자연스럽게 떠다니는 느낌)
            const time = Date.now() / 1000;
            for (let i = 0; i < 3; i++) {
                const px = flagX + 20 + Math.sin(time * 0.8 + i * 2.5) * 25;
                const py = flagY + 20 + Math.cos(time * 0.6 + i * 2) * 20 + i * 10;
                const alpha = 0.6 + Math.sin(time * 2 + i) * 0.4;
                ctx.fillStyle = `rgba(255, 255, 150, ${alpha})`;
                ctx.beginPath();
                ctx.arc(px, py, 3, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 다른 플레이어들 (히스토리 기반 보간/예측 + 스무딩)
            Object.entries(players).forEach(([sid, p]) => {
                const tp = getInterpolatedRemote(sid, p || {});
                const initX = (typeof tp.x === 'number') ? tp.x : 0;
                const initY = (typeof tp.y === 'number') ? tp.y : 0;
                const sp = smoothedPlayers[sid] || (smoothedPlayers[sid] = { x: initX, y: initY });

                const tx = (typeof tp.x === 'number') ? tp.x : 0;
                const ty = (typeof tp.y === 'number') ? tp.y : 0;
                let dx = tx - sp.x;
                let dy = ty - sp.y;
                const dist = Math.hypot(dx, dy);

                // 아주 작은 보정(패킷 지터/서버 미세 교정)로 인한 덜덜 떨림 방지
                const DEAD = 0.18;
                if (Math.abs(dx) < DEAD) dx = 0;
                if (Math.abs(dy) < DEAD) dy = 0;

                // 순간이동급 차이는 바로 스냅 (심한 끊김/튀는 느낌 방지)
                if (dist > 220) {
                    sp.x = tx;
                    sp.y = ty;
                    // also snap integer render cache to avoid a few frames of wobble after teleport
                    sp.rx = Math.round(sp.x);
                    sp.ry = Math.round(sp.y);
                } else {
                    // 가까울수록 더 천천히 따라가서 미세한 흔들림을 흡수
                    const k = dist < 8 ? 0.22 : 0.45;
                    sp.x += dx * k;
                    sp.y += dy * k;
                }

                // When nearly idle, snap to target to eliminate micro jitter from packet timing.
                try{
                    const tvx = (typeof tp.vx === 'number') ? tp.vx : (p.vx || 0);
                    const tvy = (typeof tp.vy === 'number') ? tp.vy : (p.vy || 0);
                    if (dist < 0.85 && Math.abs(tvx) < 0.35 && Math.abs(tvy) < 0.35){
                        sp.x = tx;
                        sp.y = ty;
                        sp.rx = Math.round(sp.x);
                        sp.ry = Math.round(sp.y);
                    }
                }catch(_){ }

                sp.color = tp.color || p.color;
                sp.name = tp.name || p.name;
                sp.isDead = !!tp.isDead;
                sp.vx = (typeof tp.vx === 'number') ? tp.vx : (p.vx || 0);
                sp.vy = (typeof tp.vy === 'number') ? tp.vy : (p.vy || 0);
                sp.onGround = (typeof tp.onGround === 'boolean') ? tp.onGround : !!p.onGround;
                sp.pushing = !!tp.pushing;

                if (!sp.facing) sp.facing = 1;
                // 원격은 vx가 작은 구간에서 부호가 흔들리며 좌우반전이 깜빡일 수 있어 임계값을 올림
                if (Math.abs(sp.vx) > 0.6) sp.facing = sp.vx < 0 ? -1 : 1;                // Render with stable pixel snap (hysteresis) to avoid 1px wobble.
                if (typeof sp.rx !== 'number') sp.rx = Math.round(sp.x);
                if (typeof sp.ry !== 'number') sp.ry = Math.round(sp.y);
                const SNAP_H = 0.55;
                if (Math.abs(sp.x - sp.rx) > SNAP_H) sp.rx = Math.round(sp.x);
                if (Math.abs(sp.y - sp.ry) > SNAP_H) sp.ry = Math.round(sp.y);
                const rx = sp.rx;
                const ry = sp.ry;

                drawHamster(rx, ry, sp.color, sp.name, false, sp.isDead, { vx: sp.vx, vy: sp.vy, onGround: sp.onGround, facing: sp.facing, pushing: sp.pushing });
            });
// 로컬 플레이어
            drawHamster(localPlayer.x, localPlayer.y, localPlayer.color, localPlayer.name, true, localPlayer.isDead, localPlayer);
            
            ctx.restore();
        }
        
                // ==================== 캐릭터 렌더링 (픽셀 / 2등신 + 귀/꼬리 + 간단 애니메이션) ====================
        function _hexToRgb(hex){
            const h = (hex || '#000000').replace('#','').trim();
            const v = h.length === 3 ? h.split('').map(c=>c+c).join('') : h.padEnd(6,'0').slice(0,6);
            const n = parseInt(v,16);
            return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
        }
        function _rgbToHex(r,g,b){
            const to = (x)=>('0'+Math.max(0,Math.min(255,Math.round(x))).toString(16)).slice(-2);
            return '#'+to(r)+to(g)+to(b);
        }
        function _shade(hex, amt){
            const {r,g,b} = _hexToRgb(hex);
            // amt: -100..100
            const f = (x)=> x + (amt/100) * (amt>0 ? (255-x) : x);
            return _rgbToHex(f(r), f(g), f(b));
        }

        function drawHamster(x, y, color, name, isLocal = false, isDead = false, state = null) {
            const s = state || {};
            const vx = (typeof s.vx === 'number') ? s.vx : 0;
            const vy = (typeof s.vy === 'number') ? s.vy : 0;
            const onGround = (typeof s.onGround === 'boolean') ? s.onGround : false;
            const facing = (typeof s.facing === 'number') ? s.facing : (vx < -0.2 ? -1 : 1);
            const variant = (typeof s.variant === 'number') ? s.variant : 0;
            const pushing = !!s.pushing || (typeof s.pushAnimUntil === 'number' && performance.now() < s.pushAnimUntil);

            // 사망 시 반투명 처리
            if (isDead) ctx.globalAlpha = 0.4;

            // 그림자 (기존 유지)
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(x + 20, y + 38, 14, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            // 픽셀 스케일/크기
            const PX = 2;         // 1px = 2 screen px
            const W = 16, H = 18; // sprite pixels (2등신 느낌)
            const drawW = W * PX, drawH = H * PX;

            // 히트박스(40x40) 바닥에 스프라이트를 정렬
            const baseX = Math.round(x + 20 - drawW / 2);
            const baseY = Math.round(y + 40 - drawH);

            // 애니메이션 파라미터
            const t = performance.now() / 1000;
            const moving = onGround && Math.abs(vx) > 0.6;
            const jumping = !onGround && vy < -0.6;

            const walkPhase = moving ? (Math.floor(t * 10) % 2) : 0;
            const bob = moving ? Math.sin(t * 12) * 0.8 : Math.sin(t * 2.2) * 0.4;
            const bobPx = Math.round(bob); // pixel 단위

            // 팔/다리 포즈
            const armUp = jumping;
            const legsTuck = !onGround;
            const pushPose = pushing && !isDead;

            // 꼬리 흔들림
            const tailWag = moving ? (walkPhase ? 1 : -1) : (Math.sin(t * 3) > 0 ? 1 : -1);

            // 컬러 팔레트 (플레이어 색 기반)
            const OUT = _shade(color, -45);
            const BASE = color;
            const HI = _shade(color, 25);
            // 요청: 얼굴(얼굴/배 영역)은 살색으로 고정
            const FACE = '#f2c8a0';
            const HAIR = _shade(color, -65);
            const INNER = '#ffb8d0';
            const EYE = '#1f1f1f';
            const BLUSH = 'rgba(255,184,208,0.8)';

            // 픽셀 그리기 헬퍼
            const p = (px, py, w, h, c) => {
                if (w === undefined) w = 1;
                if (h === undefined) h = 1;
                ctx.fillStyle = c;
                ctx.fillRect(baseX + px * PX, baseY + (py + bobPx) * PX, w * PX, h * PX);
            };

            // 좌우 반전(방향)
            ctx.save();
            ctx.imageSmoothingEnabled = false;
            const cx = baseX + drawW / 2;
            const cy = baseY + drawH / 2;
            ctx.translate(cx, cy);
            ctx.scale(facing, 1);
            ctx.translate(-cx, -cy);

            // ===== 꼬리 (먼저) =====
            const tw = tailWag;
            p(1 + (tw > 0 ? 0 : 1), 11, 2, 1, OUT);
            p(1 + (tw > 0 ? 0 : 1), 12, 3, 2, OUT);
            p(2 + (tw > 0 ? 0 : 1), 12, 2, 2, BASE);
            p(3 + (tw > 0 ? 0 : 1), 13, 1, 1, HI);

            // ===== 몸통 =====
            p(4, 9, 8, 7, OUT);
            p(5, 10, 6, 5, BASE);
            p(6, 11, 4, 3, FACE);
            // 개성 포인트(바디 무늬)
            if (variant === 1) { p(6, 12, 4, 1, HI); }
            if (variant === 2) { p(7, 12, 2, 1, INNER); }
            if (variant === 3) { p(8, 11, 1, 2, HI); }


            // ===== 머리 =====
            p(3, 2, 10, 8, OUT);
            p(4, 3, 8, 6, BASE);
            p(5, 4, 6, 4, FACE);

            // 4명 각각 작은 포인트(색/장식만 다르게)(색/장식만 다르게)
            if (variant === 0){
                // 리본
                p(3, 4, 1, 1, '#ffd1dc');
                p(4, 4, 1, 1, '#ffd1dc');
            } else if (variant === 1){
                // 별 머리핀
                p(11, 3, 1, 1, '#ffe66d');
                p(12, 3, 1, 1, '#ffe66d');
            } else if (variant === 2){
                // 헤어밴드
                p(4, 3, 8, 1, 'rgba(255,255,255,0.9)');
            } else if (variant === 3){
                // 작은 꽃
                p(4, 5, 1, 1, '#ffb8d0');
                p(4, 6, 1, 1, '#ff6b6b');
            }

// ===== 귀 =====
            p(4, 0, 3, 3, OUT);
            p(9, 0, 3, 3, OUT);
            p(5, 1, 2, 2, BASE);
            p(10, 1, 2, 2, BASE);
            p(6, 2, 1, 1, INNER);
            p(11, 2, 1, 1, INNER);

            // ===== 팔 =====
            if (pushPose) {
                // 밀치기 포즈: 앞팔을 뻗고 몸을 살짝 앞으로
                p(2, 11, 2, 3, OUT);
                p(3, 12, 1, 2, BASE);

                // 앞쪽(전면) 팔
                p(12, 10, 3, 2, OUT);
                p(13, 11, 2, 1, BASE);
                p(15, 11, 1, 1, HI);
            } else if (armUp) {
                p(2, 8, 2, 2, OUT);
                p(12, 8, 2, 2, OUT);
                p(3, 9, 1, 1, BASE);
                p(12, 9, 1, 1, BASE);
            } else {
                p(3, 11, 2, 3, OUT);
                p(11, 11, 2, 3, OUT);
                p(4, 12, 1, 2, BASE);
                p(11, 12, 1, 2, BASE);
            }

            // ===== 다리 =====
            if (legsTuck) {
                p(6, 15, 2, 2, OUT);
                p(8, 15, 2, 2, OUT);
                p(7, 16, 1, 1, BASE);
                p(9, 16, 1, 1, BASE);
            } else {
                const a = walkPhase ? 1 : 0;
                p(6, 15, 2, 2, OUT);
                p(9, 15, 2, 2, OUT);
                p(7, 16 - a, 1, 1, BASE);
                p(10, 16 - (1 - a), 1, 1, BASE);
            }

            // ===== 얼굴 =====
            // ===== 눈 (세로 2px) =====
            p(6, 6, 1, 2, EYE);
            p(10, 6, 1, 2, EYE);
            // 하이라이트(위쪽 1px)
            p(6, 5, 1, 1, 'rgba(255,255,255,0.9)');
            p(10, 5, 1, 1, 'rgba(255,255,255,0.9)');
            // 코/입
            p(8, 7, 1, 1, INNER);
            p(8, 8, 2, 1, OUT);

            // 볼터치
            ctx.fillStyle = BLUSH;
            ctx.fillRect(baseX + 5 * PX, baseY + (8 + bobPx) * PX, 2 * PX, 1 * PX);
            ctx.fillRect(baseX + 9 * PX, baseY + (8 + bobPx) * PX, 2 * PX, 1 * PX);

            // 로컬 표시(픽셀 화살표)
            if (isLocal && !isDead) {
                p(7, -2, 2, 1, '#ffd700');
                p(8, -3, 1, 1, '#ffd700');
            }

            // 사망 표시 (픽셀 X)
            if (isDead) {
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ff3b3b';
                for (let i = 0; i < 6; i++) {
                    ctx.fillRect(baseX + (5 + i) * PX, baseY + (4 + i + bobPx) * PX, PX, PX);
                    ctx.fillRect(baseX + (10 - i) * PX, baseY + (4 + i + bobPx) * PX, PX, PX);
                }
            }

            ctx.restore();

            // 이름표 (이름이 있을 때만)
            if (name) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.beginPath();
                ctx.roundRect(x - 5, y - 15, 50, 14, 7);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = '9px Jua';
                ctx.textAlign = 'center';
                ctx.fillText(name, x + 20, y - 4);
            }

            // globalAlpha 복원
            ctx.globalAlpha = 1;
        }
        function drawGoalEdgeIndicatorOverlay(){
            if (!canvas || !ctx || !gameObjects || !gameObjects.goal || !localPlayer) return;
            const goal = gameObjects.goal;
            // 목적지 도착 시 화살표 숨김
            if (localPlayer.x + 20 > goal.x && localPlayer.x < goal.x + goal.width &&
                localPlayer.y + 40 > goal.y && localPlayer.y < goal.y + goal.height) return;

            const gx = goal.x + (goal.width || 0) * 0.5;
            const gy = goal.y + (goal.height || 0) * 0.5;
            const sx = gx - cameraX;
            const sy = gy - cameraY;

            // UI 침범 방지 safe 영역 (상단 HUD / 우상단 UI 여백)
            const margin = 16;
            const safeTop = 108;
            const safeRight = 152;
            const left = margin;
            const right = canvas.width - margin;
            const top = safeTop;
            const bottom = canvas.height - margin;

            // goal 중심이 안전 화면 안에 보이면 표시하지 않음
            if (sx >= left && sx <= (right - safeRight) && sy >= top && sy <= bottom) return;

            // 안전 영역 중심에서 goal 방향으로 향하는 선과 경계의 교점 계산
            const rcLeft = left;
            const rcRight = right - safeRight;
            const rcTop = top;
            const rcBottom = bottom;
            const ox = (rcLeft + rcRight) * 0.5;
            const oy = (rcTop + rcBottom) * 0.5;
            const dx = sx - ox;
            const dy = sy - oy;
            if (Math.abs(dx) < 0.001 && Math.abs(dy) < 0.001) return;

            let t = Infinity;
            if (dx > 0) t = Math.min(t, (rcRight - ox) / dx);
            if (dx < 0) t = Math.min(t, (rcLeft - ox) / dx);
            if (dy > 0) t = Math.min(t, (rcBottom - oy) / dy);
            if (dy < 0) t = Math.min(t, (rcTop - oy) / dy);
            if (!Number.isFinite(t) || t <= 0) return;

            let cx = ox + dx * t;
            let cy = oy + dy * t;
            // 경계에서 살짝 안쪽으로 밀기
            const inset = 7;
            cx = clamp(cx, rcLeft + inset, rcRight - inset);
            cy = clamp(cy, rcTop + inset, rcBottom - inset);

            const ang = Math.atan2(dy, dx);
            const pulse = 1 + Math.sin(performance.now() * 0.01) * 0.06;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(ang);
            ctx.scale(pulse, pulse);

            ctx.globalAlpha = 0.18;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(0, 0, 7.2, 0, Math.PI * 2);
            ctx.fill();

            ctx.globalAlpha = 0.78;
            ctx.fillStyle = '#ff4d4d';
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 1.1;
            ctx.beginPath();
            ctx.moveTo(10, 0);
            ctx.lineTo(-1.5, -6);
            ctx.lineTo(0.8, -2.6);
            ctx.lineTo(-7.5, -2.6);
            ctx.lineTo(-7.5, 2.6);
            ctx.lineTo(0.8, 2.6);
            ctx.lineTo(-1.5, 6);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.globalAlpha = 0.45;
            ctx.strokeStyle = '#fff';
            ctx.beginPath();
            ctx.moveTo(5.5, 0);
            ctx.lineTo(-2.4, 0);
            ctx.stroke();

            ctx.restore();
        }

        function drawMobileJoystickOverlay(){
            if (!mobileJoystick.active) return;
            ctx.save();
            ctx.globalAlpha = 0.25;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(mobileJoystick.baseX, mobileJoystick.baseY, JOY_MAX_RADIUS, 0, Math.PI*2);
            ctx.fill();
            ctx.globalAlpha = 0.55;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(mobileJoystick.baseX, mobileJoystick.baseY, JOY_MAX_RADIUS, 0, Math.PI*2);
            ctx.stroke();
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = '#74b9ff';
            ctx.beginPath();
            ctx.arc(mobileJoystick.x, mobileJoystick.y, 20, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();
        }

        function drawOverlays(){
            drawGoalEdgeIndicatorOverlay();
            drawMobileJoystickOverlay();
        }

        // ==================== 게임 루프 ====================
        function gameLoop() {
            if (!gameRunning) return;
            updateRoundTimerUI();
            if (!roundTimedOut && getRoundTimeLeftSec() <= 0){ onRoundTimeout(); return; }
            updatePhysics();
            render();
            drawOverlays();
            rafId = requestAnimationFrame(gameLoop);
        }
        
        
        // ==================== Colyseus 브릿지 (Firebase 제거) ====================
        let mySessionId = null;
        let mySeat = 0;
        let tgEnded = false; // embed 멀티에서 결과 전송 중복 방지

        function bridgeSendOver(success, reason){
            if (!EMBED || isGuestMode) return;
            if (tgEnded) return;
            tgEnded = true;
            bridgeSend("tg_over", { success: !!success, reason: reason || (success ? "clear" : "fail") });
        }

        // ==================== 원격 플레이어 보간/예측 ====================
        function recordRemoteSnapshot(sid, p){
            const now = performance.now();
            const arr = remoteHistory[sid] || (remoteHistory[sid] = []);
            arr.push({
                t: now,
                x: (p && typeof p.x === 'number') ? p.x : (p?.x || 0),
                y: (p && typeof p.y === 'number') ? p.y : (p?.y || 0),
                vx: (p && typeof p.vx === 'number') ? p.vx : (p?.vx || 0),
                vy: (p && typeof p.vy === 'number') ? p.vy : (p?.vy || 0),
                onGround: !!p?.onGround,
                isDead: !!p?.isDead,
                color: p?.color,
                name: p?.name,
                variant: (typeof p?.variant === 'number') ? p.variant : 0,
                pushing: !!p?.pushing
            });

            // 히스토리 정리
            const cutoff = now - NET_MAX_HISTORY_MS;
            while (arr.length > 2 && arr[1].t < cutoff) arr.shift();
            if (arr.length > 80) arr.splice(0, arr.length - 80);
        }

        function getInterpolatedRemote(sid, fallback){
            const hist = remoteHistory[sid];
            const now = performance.now();
            const renderT = now - NET_INTERP_DELAY_MS;
            if (!hist || hist.length === 0) return fallback || { x: 0, y: 0 };

            // 너무 오래된 히스토리 정리
            const cutoff = now - NET_MAX_HISTORY_MS;
            while (hist.length > 2 && hist[1].t < cutoff) hist.shift();

            // renderT 이전의 마지막 스냅샷 찾기
            let i = 0;
            while (i < hist.length - 1 && hist[i + 1].t <= renderT) i++;

            const a = hist[i];
            const b = hist[i + 1];

            // 구간 보간
            if (b && a.t <= renderT && renderT <= b.t) {
                const span = (b.t - a.t) || 1;
                const alpha = (renderT - a.t) / span;
                return {
                    x: a.x + (b.x - a.x) * alpha,
                    y: a.y + (b.y - a.y) * alpha,
                    vx: b.vx,
                    vy: b.vy,
                    onGround: !!b.onGround,
                    isDead: !!b.isDead,
                    color: b.color,
                    name: b.name,
                    variant: (typeof b.variant === 'number') ? b.variant : 0,
                    pushing: !!b.pushing
                };
            }

            // 최신 스냅샷 이후면 짧게 예측 (끊김 완화)
            const last = hist[hist.length - 1];
            const dtMs = Math.max(0, Math.min(200, renderT - last.t));
            const frames = dtMs / 16.6667;
            const g = 0.4;
            return {
                x: last.x + (last.vx || 0) * frames,
                y: last.y + (last.vy || 0) * frames + 0.5 * g * frames * frames,
                vx: last.vx,
                vy: last.vy,
                onGround: !!last.onGround,
                isDead: !!last.isDead,
                color: last.color,
                name: last.name,
                variant: (typeof last.variant === 'number') ? last.variant : 0,
                pushing: !!last.pushing
            };
        }

        function getRemotePosForLogic(sid, p){
            // Use smoothed(render) position when available to avoid visible gaps / mismatch.
            try{
                const sp = smoothedPlayers && smoothedPlayers[sid];
                if (sp && typeof sp.x === 'number' && typeof sp.y === 'number'){
                    return { x: sp.x, y: sp.y };
                }
            }catch(_){ }
            const rp = getInterpolatedRemote(sid, p || {});
            const x = (typeof rp.x === 'number') ? rp.x : ((p && typeof p.x === 'number') ? p.x : (p?.x || 0));
            const y = (typeof rp.y === 'number') ? rp.y : ((p && typeof p.y === 'number') ? p.y : (p?.y || 0));
            return { x, y };
        }

        function applyRemotePlayers(map){
            const next = {};
            if (!map) map = {};
            for (const [sid, p] of Object.entries(map)){
                if (sid === mySessionId) continue;
                next[sid] = p;
                // 스냅샷 기록 (보간/예측)
                recordRemoteSnapshot(sid, p);
                // init smoothing slot
                if (!smoothedPlayers[sid]){
                    smoothedPlayers[sid] = { x: p.x||0, y: p.y||0, vx: p.vx||0, vy: p.vy||0, onGround: !!p.onGround, isDead: !!p.isDead, pushing: !!p.pushing };
                }
                // keep name/color immediately (no alpha)
                smoothedPlayers[sid].name = p.name;
                smoothedPlayers[sid].color = p.color;
                smoothedPlayers[sid].variant = (typeof p.variant === 'number') ? p.variant : 0;
                smoothedPlayers[sid].pushing = !!p.pushing;
            }
            players = next;
            // prune removed
            for (const sid of Object.keys(smoothedPlayers)){
                if (!players[sid]) delete smoothedPlayers[sid];
            }
            for (const sid of Object.keys(remoteHistory)){
                if (!players[sid]) delete remoteHistory[sid];
            }
            updatePlayerList();
        }

        function applyButtons(btnMap){
            if (!btnMap || !gameObjects?.buttons) return;
            for (const [idxStr, pressed] of Object.entries(btnMap)){
                const idx = parseInt(idxStr, 10);
                if (gameObjects.buttons[idx]) gameObjects.buttons[idx].pressed = !!pressed;
            }
            updateDoors();
            updateBridges();
            updateLifts();
        }

        function ensureBoxIds(){
            if (!gameObjects || !Array.isArray(gameObjects.boxes)) return;
            for (let i = 0; i < gameObjects.boxes.length; i++) {
                const b = gameObjects.boxes[i];
                if (!b) continue;
                if (b.id == null) b.id = `b${i}`;
            }
        }

        function normalizeBoxArrayForSync(boxes){
            if (!Array.isArray(boxes)) return [];
            return boxes.map((b, i) => ({
                id: String((b && b.id != null) ? b.id : `b${i}`),
                x: Math.round(Number(b?.x) || 0),
                y: Math.round(Number(b?.y) || 0),
                vx: Number(b?.vx) || 0,
                vy: Number(b?.vy) || 0,
                width: Math.max(8, Math.round(Number(b?.width) || 40)),
                height: Math.max(8, Math.round(Number(b?.height) || 40))
            }));
        }

        function applyBoxSnapshot(payload){
            lastTgPuzzleSnapshotAt = performance.now();
            const level = parseInt(payload?.level, 10) || currentLevel;
            const incoming = normalizeBoxArrayForSync(payload?.boxes || []);
            if (!gameObjects || !Array.isArray(gameObjects.boxes)) {
                pendingBoxSnapshot = { level, boxes: incoming };
                return;
            }
            if (level !== currentLevel) {
                pendingBoxSnapshot = { level, boxes: incoming };
                return;
            }
            ensureBoxIds();
            const localMap = new Map((gameObjects.boxes || []).map((b, idx) => [String(b.id ?? `b${idx}`), b]));
            for (const src of incoming) {
                const dst = localMap.get(String(src.id));
                if (!dst) continue;
                dst.prevX = dst.x;
                dst.prevY = dst.y;
                dst.x = src.x;
                dst.y = src.y;
                dst.vx = src.vx;
                dst.vy = src.vy;
                if (src.width) dst.width = src.width;
                if (src.height) dst.height = src.height;
            }
        }

        function normalizePuzzleSnapshotForSync(payload){
            const level = parseInt(payload?.level, 10) || currentLevel;
            const buttons = {};
            if (payload && payload.buttons && typeof payload.buttons === 'object') {
                for (const [k,v] of Object.entries(payload.buttons)) buttons[String(k)] = !!v;
            }
            const doors = Array.isArray(payload?.doors) ? payload.doors.map((d,i)=>({ idx:i, open: !!(d&&d.open) })) : [];
            const lifts = Array.isArray(payload?.lifts) ? payload.lifts.map((l,i)=>({ idx:i, y: Number(l?.y)||0 })) : [];
            const bridges = Array.isArray(payload?.bridges) ? payload.bridges.map((b,i)=>({ idx:i, active: !!(b&&b.active) })) : [];
            const boxes = normalizeBoxArrayForSync(payload?.boxes || []);
            return { level, buttons, doors, lifts, bridges, boxes };
        }

        function applyPuzzleSnapshot(payload){
            lastTgPuzzleSnapshotAt = performance.now();
            const snap = normalizePuzzleSnapshotForSync(payload);
            if (!gameObjects || !Array.isArray(gameObjects.boxes)) {
                pendingPuzzleSnapshot = snap;
                return;
            }
            if (snap.level !== currentLevel) {
                pendingPuzzleSnapshot = snap;
                return;
            }

            // Buttons first so derived local logic stays consistent if some systems still query them.
            if (gameObjects.buttons && snap.buttons) {
                for (const [idxStr, pressed] of Object.entries(snap.buttons)) {
                    const idx = parseInt(idxStr, 10);
                    if (gameObjects.buttons[idx]) gameObjects.buttons[idx].pressed = !!pressed;
                }
            }

            if (Array.isArray(gameObjects.doors) && Array.isArray(snap.doors)) {
                snap.doors.forEach(({idx, open}) => { if (gameObjects.doors[idx]) gameObjects.doors[idx].open = !!open; });
            }
            if (Array.isArray(gameObjects.lifts) && Array.isArray(snap.lifts)) {
                snap.lifts.forEach(({idx, y}) => { if (gameObjects.lifts[idx]) gameObjects.lifts[idx].y = y; });
            }
            if (Array.isArray(gameObjects.bridges) && Array.isArray(snap.bridges)) {
                snap.bridges.forEach(({idx, active}) => { if (gameObjects.bridges[idx]) gameObjects.bridges[idx].active = !!active; });
            }

            applyBoxSnapshot({ level: snap.level, boxes: snap.boxes });
            pendingPuzzleSnapshot = null;
        }

        function maybeBroadcastPuzzleState(){
            if (!EMBED || isGuestMode || !isAuthoritativeBoxSim()) return;
            if (!gameObjects) return;
            ensureBoxIds();
            const now = performance.now();
            if (now - lastSentBoxSnapshotAt < 66) return;
            const boxes = normalizeBoxArrayForSync(gameObjects.boxes || []);
            const buttons = {};
            (gameObjects.buttons || []).forEach((b, idx) => { buttons[String(idx)] = !!b.pressed; });
            const doors = (gameObjects.doors || []).map(d => ({ open: !!d.open }));
            const lifts = (gameObjects.lifts || []).map(l => ({ y: Math.round(Number(l.y) || 0) }));
            const bridges = (gameObjects.bridges || []).map(b => ({ active: !!b.active }));
            const sig = [
                boxes.map(b => `${b.id}:${b.x},${b.y},${Math.round(b.vx*10)},${Math.round(b.vy*10)}`).join('|'),
                Object.entries(buttons).map(([k,v])=>`${k}:${v?1:0}`).join(','),
                doors.map((d,i)=>`${i}:${d.open?1:0}`).join(','),
                lifts.map((l,i)=>`${i}:${l.y}`).join(','),
                bridges.map((b,i)=>`${i}:${b.active?1:0}`).join(',')
            ].join('#');
            if (sig === lastSentBoxSnapshotSig && now - lastSentBoxSnapshotAt < 180) return;
            lastSentBoxSnapshotSig = sig;
            lastSentBoxSnapshotAt = now;
            bridgeSend('tg_puzzle', { level: currentLevel, boxes, buttons, doors, lifts, bridges });
        }

        function maybeBroadcastBoxes(){
            if (!EMBED || isGuestMode || !isAuthoritativeBoxSim()) return;
            if (!gameObjects || !Array.isArray(gameObjects.boxes) || !gameObjects.boxes.length) return;
            ensureBoxIds();
            const now = performance.now();
            if (now - lastSentBoxSnapshotAt < 66) return; // ~15Hz
            const boxes = normalizeBoxArrayForSync(gameObjects.boxes);
            const sig = boxes.map(b => `${b.id}:${b.x},${b.y},${Math.round(b.vx*10)},${Math.round(b.vy*10)}`).join('|');
            if (sig === lastSentBoxSnapshotSig && now - lastSentBoxSnapshotAt < 180) return;
            lastSentBoxSnapshotSig = sig;
            lastSentBoxSnapshotAt = now;
            bridgeSend('tg_boxes', { level: currentLevel, boxes });
        }

        function bridgeSendState(force=false){
            if (!EMBED || isGuestMode) return;
            const now = performance.now();
            if (!force && bridgeSendState._t && (now - bridgeSendState._t) < 33) return; // ~20Hz
            bridgeSendState._t = now;
            bridgeSend("tg_state", {
                state: {
                    x: localPlayer.x, y: localPlayer.y,
                    vx: localPlayer.vx, vy: localPlayer.vy,
                    onGround: !!localPlayer.onGround,
                    onButton: !!localPlayer.onButton,
                    isDead: !!localPlayer.isDead,
                    color: localPlayer.color,
                    name: localPlayer.name,
                    level: currentLevel,
                    deathCount,
                    variant: localPlayer.variant,
                    pushing: (performance.now() < (localPlayer.pushAnimUntil || 0))
                }
            });
        }

        // Embed 모드 진입: 내부 로비/설정 UI 제거, 부모에게 준비 신호
        if (EMBED){
            try{
                const lobby = document.getElementById('lobby');
                if (lobby){
                    // 로비 UI는 부모 로비를 사용하므로 최소화
                    const hide = lobby.querySelectorAll('button, details, .input-group');
                    hide.forEach(el => el.style.display = 'none');
                    const subtitle = lobby.querySelector('.lobby-subtitle');
                    if (subtitle) subtitle.textContent = '연결 중...';
                }
                bridgeSend("bridge_ready", {});
            }catch(e){}
        }

        window.addEventListener("message", (e)=>{
            const d = e.data || {};
            if (!d || typeof d !== "object") return;
            if (typeof d.type === 'string' && d.type.startsWith('tg_')) lastTgAnyNetAt = performance.now();

            if (d.type === "bridge_init"){
                mySessionId = String(d.sessionId || "");
                mySeat = typeof d.seat === "number" ? d.seat : 0;
                startEmbedded({
                    nick: d.nick || "햄찌",
                    seat: mySeat,
                    isHost: !!d.isHost,
                    sessionId: mySessionId,
                    roomCode: d.roomCode || "ROOM",
                    practice: !!d.practice
                });
                if (d.players) applyRemotePlayers(d.players);
                if (d.level) {
                    const lv = parseInt(d.level, 10);
                    if (lv) { currentLevel = lv; }
                }
                return;
            }

            if (d.type === "tg_players"){
                applyRemotePlayers(d.players || {});
                return;
            }

            if (d.type === "tg_level"){
                const lv = parseInt(d.level, 10);
                if (lv && lv !== currentLevel){
                    currentLevel = lv;
                    loadLevel(currentLevel);
                }
                return;
            }

            if (d.type === "tg_buttons"){
                applyButtons(d.buttons || {});
                return;
            }

            if (d.type === "tg_button"){
                if (gameObjects?.buttons && gameObjects.buttons[d.idx]){
                    gameObjects.buttons[d.idx].pressed = !!d.pressed;
                    updateDoors();
                    updateBridges();
                    updateLifts();
                }
                return;
            }

            if (d.type === "tg_puzzle"){
                applyPuzzleSnapshot(d);
                return;
            }

            if (d.type === "tg_boxes"){
                applyBoxSnapshot(d);
                return;
            }

            if (d.type === "tg_box_impulse"){
                const level = parseInt(d.level, 10) || currentLevel;
                if (level !== currentLevel || !gameObjects || !Array.isArray(gameObjects.boxes)) return;
                ensureBoxIds();
                const id = String(d.id || '');
                const box = gameObjects.boxes.find(b => String(b.id||'') === id);
                if (!box) return;
                const ivx = clamp(Number(d.vx) || 0, -8, 8);
                if (!ivx) return;
                // 호스트만 박스 물리를 실제로 업데이트한다.
                // 게스트는 곧 tg_puzzle/tg_boxes 스냅샷이 오므로 여기서 물리 상태를 덮어쓰지 않는다.
                if (isAuthoritativeBoxSim()) box.vx = ivx;
                return;
            }

            if (d.type === "tg_push"){
                const to = String(d.to || "");
                if (to && mySessionId && to !== mySessionId) return;
                const dx = clamp(Number(d.dx) || 0, -16, 16);
                const dy = clamp(Number(d.dy) || 0, -16, 16);
                const now = performance.now();
                // Remember knockback so it is not immediately overwritten by local movement input
                localPlayer.knockbackUntil = now + 320;
                if (!dx && !dy) return;
                // Apply impulse (horizontal + slight lift)
                if (dx){
                    localPlayer.x += dx;
                    localPlayer.knockbackVx = clamp((localPlayer.knockbackVx || 0) + dx * 0.95, -12, 12);
                    localPlayer.vx = clamp((localPlayer.vx || 0) + dx * 0.55, -12, 12);
                }
                if (dy){
                    localPlayer.y += dy * 0.25;
                    localPlayer.vy = clamp((localPlayer.vy || 0) + dy * 0.55, JUMP_VELOCITY * 1.4, MAX_FALL_SPEED);
                    if (dy < 0) localPlayer.onGround = false;
                }
                try{ sfxPush(); }catch(_){ }
                bridgeSendState(true);
                return;
            }

            if (d.type === "tg_floors"){
                // full sync of floors (may arrive before level is ready)
                const arr = Array.isArray(d.floors) ? d.floors : [];
                if (!gameObjects || !gameObjects.platforms){
                    pendingFloorFullSync = arr;
                    pendingFloorAdds = [];
                    pendingFloorAddSet.clear();
                    pendingFloorRemoves = [];
                    return;
                }
                clearAllFloors();
                for (const pl of arr) addFloorPlatform(pl);
                return;
            }

            if (d.type === "tg_floor") {
                // Floor broadcast (server may echo our own floor). Duplicates are ignored by addFloorPlatform.
                addFloorPlatform(d);
                return;
            }

            if (d.type === "tg_floor_remove"){
                if (!gameObjects || !gameObjects.platforms){
                    pendingFloorRemoves.push({ owner: d.owner || null, ids: Array.isArray(d.ids) ? d.ids : null });
                    return;
                }
                if (d.ids && Array.isArray(d.ids)) {
                    for (const id of d.ids) removeFloorById(id);
                } else if (d.owner) {
                    removeFloorsByOwner(d.owner);
                }
                return;
            }

            if (d.type === "tg_reset"){
                showDeathEffect(()=> resetMap());
                return;
            }
        });

// 페이지 로드시 저장된 이름 복원
        const savedName = localStorage.getItem('playerName');
        if (savedName) {
            document.getElementById('playerName').value = savedName;
        }
        
        document.getElementById('playerName').addEventListener('change', (e) => {
            localStorage.setItem('playerName', e.target.value);
        });
    </script>

<script>
(function(){
  function ping(){
    try{
      if (window.parent && window.parent !== window){
        window.parent.postMessage({ type: "tg_iframe_tap" }, "*");
      }
    }catch(e){}
  }
  window.addEventListener("pointerdown", ping, { passive: true });
  window.addEventListener("touchstart", ping, { passive: true });
  window.addEventListener("mousedown", ping, { passive: true });
})();
</script>
